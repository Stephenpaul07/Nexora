{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NEXORA | Modern E-Commerce</title>

<link rel="icon" href="{% static 'images/favicon.ico' %}">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="{% static 'css/bootstrap.css' %}" rel="stylesheet">

<!-- Font Awesome -->
<link href="{% static 'fonts/fontawesome/css/all.min.css' %}" rel="stylesheet">

<!-- Existing CSS -->
<link href="{% static 'css/ui.css' %}" rel="stylesheet">
<link href="{% static 'css/custom.css' %}" rel="stylesheet">
<link href="{% static 'css/responsive.css' %}" rel="stylesheet">

<!-- JQuery -->
<script src="{% static 'js/jquery-3.3.1.min.js' %}"></script>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'js/script.js' %}"></script>

<style>

:root{

--primary:#4F46E5;
--primary-dark:#3730A3;

--secondary:#111827;

--accent:#06B6D4;

--success:#22C55E;

--danger:#EF4444;

--warning:#F59E0B;

--background:#F8FAFC;

--card:#FFFFFF;

--border:#E5E7EB;

--text:#111827;

--text-light:#6B7280;

--shadow:0 12px 35px rgba(0,0,0,.08);

--radius:18px;

}

/* =================== RESET =================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
transition:.25s ease;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Inter',sans-serif;

background:var(--background);

color:var(--text);

overflow-x:hidden;

}

/* Scrollbar */

::-webkit-scrollbar{
width:9px;
}

::-webkit-scrollbar-thumb{
background:var(--primary);
border-radius:30px;
}

::-webkit-scrollbar-track{
background:#ECEFF4;
}

::selection{
background:var(--primary);
color:#fff;
}

/* Wrapper */

.main-wrapper{

display:flex;

flex-direction:column;

min-height:100vh;

}

/* Main Content */

.content-area{

flex:1;

padding:45px 0;

}

/* Navbar */

.navbar{

background:#fff !important;

box-shadow:0 8px 25px rgba(0,0,0,.06);

position:sticky;

top:0;

z-index:999;

}

/* Cards */

.card{

background:#fff;

border:none;

border-radius:22px;

overflow:hidden;

box-shadow:var(--shadow);

}

.card:hover{

transform:translateY(-6px);

}

/* Buttons */

.btn{

border-radius:12px;

font-weight:600;

padding:10px 22px;

}

.btn-primary{

background:linear-gradient(135deg,#4F46E5,#6366F1);

border:none;

}

.btn-primary:hover{

transform:translateY(-2px);

box-shadow:0 10px 25px rgba(79,70,229,.28);

}

.btn-outline-primary{

border:2px solid var(--primary);

color:var(--primary);

}

.btn-outline-primary:hover{

background:var(--primary);

color:white;

}

/* Inputs */

.form-control{

border-radius:12px;

border:1px solid var(--border);

padding:12px 16px;

box-shadow:none !important;

}

.form-control:focus{

border-color:var(--primary);

box-shadow:0 0 0 .2rem rgba(79,70,229,.15)!important;

}

/* Links */

a{

text-decoration:none!important;

color:inherit;

}

a:hover{

color:var(--primary);

}

/* Images */

img{

max-width:100%;

}

/* Sections */

.section{

padding:70px 0;

}

/* Footer */

footer{

background:#fff;

border-top:1px solid var(--border);

margin-top:70px;

}

</style>

</head>

<body>

<div class="main-wrapper">

{% include 'includes/navbar.html' %}

<main class="content-area">

{% block content %}

{% endblock %}

</main>

{% include 'includes/footer.html' %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
